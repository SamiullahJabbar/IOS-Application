name: body_scan_app
description: "iOS Body Scanning & Product Customization Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # State Management
  provider: ^6.1.1

  # Routing
  go_router: ^14.2.0

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # UI Components
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.9
  lucide_icons: ^0.257.0
  flutter_colorpicker: ^1.1.0

  # 3D Model Viewer
  model_viewer_plus: ^1.8.0

  # Payment
  flutter_stripe: ^11.0.0

  # Utilities
  crypto: ^3.0.3
  intl: ^0.19.0
  vector_math: ^2.1.4
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  http: ^1.2.1
  screenshot: ^3.0.0
  share_plus: ^12.0.1
  uuid: ^4.3.3

  # Form Validation
  form_field_validator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/animations/
    - assets/models/
    - assets/icons/
