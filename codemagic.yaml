workflows:
  my-workflow:
    name: Flutter Build
    environment:
      flutter: stable
    scripts:
      - name: Build APK
        script: flutter build apk --debug
      - name: Build iOS Simulator
        script: flutter build ios --simulator --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/ios/iphonesimulator/Runner.app
